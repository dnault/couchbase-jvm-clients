name: Prune stale images

on:
  schedule:
    - cron: '43 3 * * *'
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (uncheck to really delete)"
        type: boolean
        required: false
        default: true

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    env:
      DRY_RUN: ${{ github.event.inputs.dry-run || 'true' }}

    strategy:
      matrix:
        sdk: [ java, kotlin, scala, columnar-java ]

    steps:
      - name: Prune old temporary images
        uses: vlaurin/action-ghcr-prune@0cf7d39f88546edd31965acba78cdcb0be14d641 # v0.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
#          organization: ${{ github.repository_owner }}
          user: ${{ github.repository_owner }}
          container: ${{ matrix.sdk }}-fit-performer
          dry-run: ${{ env.DRY_RUN }}
          keep-younger-than: 7 # days
          prune-untagged: true
          prune-tags-regexes: ^tmp-
